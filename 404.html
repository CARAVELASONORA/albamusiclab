<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | Alba Music Lab</title>
    <link rel="icon" type="image/svg+xml" href="images/logo.svg" />
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <link href="./dist/output.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;700;900&amp;display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="h-full bg-paper text-ink font-body">
    <div class="grain"></div>
    <main class="grid min-h-full place-items-center px-6 py-24 sm:py-32 lg:px-8 relative z-10">
      <div class="text-center flex flex-col items-center">
        <div class="logo-container fade-in mb-10">
          <svg class="w-32 h-32 md:w-40 md:h-40" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="Alba acoustic signature">
            <defs>
              <mask id="void-cut-404">
                <rect width="100" height="100" fill="white"></rect>
                <rect x="0" y="55" width="100" height="16" fill="black"></rect>
              </mask>
            </defs>
            <path d="M50 10 L15 85 H32 L50 45 L68 85 H85 L50 10Z" fill="#050505" mask="url(#void-cut-404)"></path>
            <path class="draw-wave wave-glow" d="M 26.5 64 L 28.5 64 L 31 59 L 34 68 L 37 60 L 40 66 L 42 63 L 45 64 L 51 64 L 54 56 L 57 71 L 60 59 L 63 67 L 65 64 L 73.5 64" fill="none" stroke="#E52E2E" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>
        <p class="signal-label mb-4">
          <span class="signal-dot"></span> Error 404 <span class="signal-dot"></span>
        </p>
        <h1 class="mt-2 text-5xl font-display font-black tracking-tighter sm:text-7xl">Signal lost</h1>
        <p class="mt-6 text-sm text-ink-mute sm:text-base max-w-md leading-relaxed">Sorry, we couldn’t find the page you’re looking for. The frequency you tuned into doesn’t exist.</p>
        <div class="mt-10 flex items-center justify-center gap-x-6">
          <a href="/" class="btn-primary inline-flex items-center gap-3 px-8 py-4 text-[0.7rem] font-bold tracking-widest uppercase rounded-sm">Go back home</a>
        </div>
      </div>
    </main>
  </body>
</html>
